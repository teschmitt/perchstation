# perchstation operator configuration.
#
# This file is loaded by `perchstation enroll`, `serve`, and `status` via
# the global `--config` flag (default `/etc/perchstation/config.toml`).
# Every field has a built-in default; override only what you need.

# perchpub *enrollment* base URL — the public Traefik entrypoint the station
# enrolls against (`:443`). Fixed at enrollment time; changing it requires
# re-enrollment so the station's cert chain matches the new authority.
perchpub_url = "https://api.perchpub.net"

# Optional override for the *upload* base — perchpub's edge terminates mTLS
# uploads on a dedicated entrypoint (`:8443`), separate from the `:443`
# enrollment entrypoint above. Leave unset to derive it automatically by
# switching `perchpub_url` to port 8443 (e.g. https://api.perchpub.net:8443);
# set it only to point uploads at a distinct host or port.
# upload_url = "https://api.perchpub.net:8443"

# Filesystem root for credentials/ and queue/{pending,inflight,delivered}/.
# Under the bundled systemd unit this is `/var/lib/perchstation` via the
# `StateDirectory=perchstation` directive — change with care.
data_dir = "/var/lib/perchstation"

[queue]
# Maximum number of clips kept on disk across pending/, inflight/, and
# delivered/ combined. Hit either ceiling and eviction runs.
max_clips = 500
# Maximum total on-disk byte size of all clips in the queue.
max_bytes = 2_147_483_648  # 2 GiB

# Eviction policy when the queue saturates:
#   "drop_oldest_undelivered" — drop oldest entries already marked
#                               Undeliverable first, then oldest pending
#                               entries (the operator-friendly default).
#   "refuse_new"              — reject new submissions while the queue is
#                               full (Inbox::submit returns QueueFull).
eviction = "drop_oldest_undelivered"

# Retention (hours) before a finished delivered/ sidecar — upload succeeded
# and its classify task reached a terminal status (or was lost) — is pruned.
# Bounds delivered/ growth so the classify poller's per-tick scan stays cheap.
delivered_retention_hours = 168  # 1 week

[retry]
# Delay before the first retry of a transient upload failure.
initial_delay_secs = 10
# Cap on per-attempt sleep. Exponential backoff with multiplier 2.0 and
# ±20 % jitter, clipped to this ceiling, so the loop wakes at least this
# often during a long outage.
max_attempt_delay_secs = 3600  # 1 hour
# Per-clip attempt count ceiling. After this the clip is marked
# Undeliverable.
per_clip_max_attempts = 12
# Per-clip wall-clock budget. After this the clip is marked Undeliverable
# even if it hasn't reached the attempt ceiling yet.
per_clip_max_wallclock_hours = 24

[capture]
# Maximum duration of a single clip in seconds. The supervisor passes
# this to the camera adapter and also wraps the call in an outer
# `clip_duration_secs + hang_margin_secs` timeout — a hung adapter
# cannot pin the capture loop past that bound.
clip_duration_secs = 8
# Slack added to `clip_duration_secs` for the outer hang-guard timeout.
# Tune up only if the camera adapter is observed to legitimately need
# more than a couple of seconds to finalise the MP4.
hang_margin_secs = 2
# Minimum wall-clock gap between consecutive recordings, measured from
# the end of one recording to the next eligible trigger. Bounds the
# worst-case clip rate during a sustained visit at
# `3600 / (clip_duration_secs + cooldown_secs)` clips per hour.
cooldown_secs = 30
# How long the motion sensor may stay continuously asserted before the
# liveness tracker flips it to `stuck_asserted` and refuses to record.
# Tune up only if the wired sensor has long legitimate hold times.
liveness_stuck_secs = 300
# Period at which the supervisor probes the sensor level for the
# liveness tracker. Bounds detection latency for a stuck or
# unavailable sensor; 5 s gives a comfortable margin under the 60 s
# SC-004 / SC-005 budget.
liveness_poll_secs = 5
# Hard ceiling on bytes the capture-staging directory may consume
# before a fresh recording is refused (the pre-record disk-pressure
# gate). Completed clips are handed straight to the delivery queue
# and never accumulate here in steady state.
max_staging_bytes = 268_435_456  # 256 MiB

# --- Hardware-specific knobs (sensor GPIO + camera) -----------------------
# These keys stay under [capture] but are platform-specific: the
# platform-agnostic core carries them opaquely and only the production
# adapters in perchstation-hw interpret them. Unknown keys here are rejected
# when the capture loop starts.
# Path to the Linux gpiochip character device the motion sensor is
# wired to. Almost always `/dev/gpiochip0` on a Pi.
sensor_gpiochip = "/dev/gpiochip0"
# BCM line number the motion sensor's output is wired to.
sensor_line = 17
# Whether the sensor's asserted state is electrical HIGH (`true`) or
# LOW (`false`). Most PIR breakouts are active-high.
sensor_active_high = true
# Camera frame width in pixels passed to the camera command.
camera_width = 1280
# Camera frame height in pixels passed to the camera command.
camera_height = 720
# Camera frame rate (frames per second) passed to the camera command.
camera_framerate = 30
# Camera target bitrate in bits per second passed to the camera command.
camera_bitrate_bps = 4_000_000  # 4 Mbit/s
# External capture binaries. Defaults target the current Raspberry Pi OS
# camera stack (rpicam-*). On older images that still ship the deprecated
# libcamera-* names, set these to "libcamera-vid" / "libcamera-still".
camera_command = "rpicam-vid"            # records motion clips (perchstation serve)
camera_still_command = "rpicam-still"    # still capture for `enroll --qr-source camera`
